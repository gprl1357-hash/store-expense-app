# CI — Build 검증

# main push / PR 시 빌드만 검증합니다.
# - Supabase 연결 없음 (placeholder env)
# - 운영 데이터 변경 없음
# - Vercel 배포는 GitHub 연동으로 별도 진행

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-ci-build-only
  NEXT_PUBLIC_MONTHLY_BUDGET: "10000000"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
